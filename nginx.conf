# Arquivo: nginx.conf
server {
    listen 80;
    server_name localhost;

    # Rota principal → seu app
    location / {
        proxy_pass http://web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Rota admin → PgAdmin
    location /admin {
        proxy_pass http://pgadmin:80;
        proxy_set_header Host $host;
    }
}